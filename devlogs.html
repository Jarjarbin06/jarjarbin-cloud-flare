<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nathan Jarjarbin - DevLogs</title>
    <link href="css/terminal.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
</head>
<body>
<a href="index.html" class="back-button">← home</a>
<section id="hero">
    <div class="terminal-window">
        <div class="terminal-bar">
            <span class="dot red"></span>
            <span class="dot yellow"></span>
            <span class="dot green"></span>
            <span class="terminal-title">jarjarbin@dev-logs: ~</span>
        </div>
        <div class="terminal-body">
            <p><span class="prompt">$</span> whoami</p>
            <p class="output">Nathan AMARAGGI - Jarjarbin</p>
            <p><span class="prompt">$</span> devlogs --list</p>
            <div id="devlogs-container" class="expendables">
                <p class="output">loading devlogs...</p>
            </div>
            <p><span class="prompt">$</span> <span class="cursor">█</span></p>
        </div>
    </div>
</section>
<footer>
    <p>built by Nathan Jarjarbin — <a href="https://github.com/Jarjarbin06/jarjarbin-cloud-flare" target="_blank">source</a></p>
</footer>
<script src="js/github-api.js"></script>
<script src="js/devlogs.js"></script>
<script src="js/expendable.js"></script>
</body>
</html>
